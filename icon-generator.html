<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .icon {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 50%, #fbbf24 100%);
            border-radius: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
            position: relative;
            overflow: hidden;
        }
        .icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            pointer-events: none;
        }
        .icon-16 { width: 16px; height: 16px; font-size: 8px; }
        .icon-32 { width: 32px; height: 32px; font-size: 14px; }
        .icon-72 { width: 72px; height: 72px; font-size: 28px; }
        .icon-96 { width: 96px; height: 96px; font-size: 36px; }
        .icon-128 { width: 128px; height: 128px; font-size: 48px; }
        .icon-144 { width: 144px; height: 144px; font-size: 54px; }
        .icon-150 { width: 150px; height: 150px; font-size: 56px; }
        .icon-152 { width: 152px; height: 152px; font-size: 58px; }
        .icon-192 { width: 192px; height: 192px; font-size: 72px; }
        .icon-384 { width: 384px; height: 384px; font-size: 144px; }
        .icon-512 { width: 512px; height: 512px; font-size: 192px; }
        
        .label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <div class="icon icon-16">ĐN</div>
            <div class="label">16x16</div>
        </div>
        <div>
            <div class="icon icon-32">ĐN</div>
            <div class="label">32x32</div>
        </div>
        <div>
            <div class="icon icon-72">ĐN</div>
            <div class="label">72x72</div>
        </div>
        <div>
            <div class="icon icon-96">ĐN</div>
            <div class="label">96x96</div>
        </div>
        <div>
            <div class="icon icon-128">ĐN</div>
            <div class="label">128x128</div>
        </div>
        <div>
            <div class="icon icon-144">ĐN</div>
            <div class="label">144x144</div>
        </div>
        <div>
            <div class="icon icon-150">ĐN</div>
            <div class="label">150x150</div>
        </div>
        <div>
            <div class="icon icon-152">ĐN</div>
            <div class="label">152x152</div>
        </div>
        <div>
            <div class="icon icon-192">ĐN</div>
            <div class="label">192x192</div>
        </div>
        <div>
            <div class="icon icon-384">ĐN</div>
            <div class="label">384x384</div>
        </div>
        <div>
            <div class="icon icon-512">ĐN</div>
            <div class="label">512x512</div>
        </div>
    </div>
    
    <script>
        // Convert to PNG using canvas
        function downloadIcon(size) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;
            
            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#d97706');
            gradient.addColorStop(0.5, '#f59e0b');
            gradient.addColorStop(1, '#fbbf24');
            
            // Draw rounded rectangle
            const radius = size * 0.2;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Add shine effect
            const shineGradient = ctx.createLinearGradient(0, 0, size, size);
            shineGradient.addColorStop(0, 'transparent');
            shineGradient.addColorStop(0.5, 'rgba(255,255,255,0.1)');
            shineGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = shineGradient;
            ctx.fill();
            
            // Add text
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.35}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = size * 0.05;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = size * 0.02;
            ctx.fillText('ĐN', size/2, size/2);
            
            // Download
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon-${size}x${size}.png`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }
        
        // Auto-download all sizes after 2 seconds
        setTimeout(() => {
            [16, 32, 72, 96, 128, 144, 150, 152, 192, 384, 512].forEach(downloadIcon);
        }, 2000);
    </script>
</body>
</html>
