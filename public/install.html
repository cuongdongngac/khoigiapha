<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Install Trigger</title>
    <link rel="manifest" href="/manifest-debug.json">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #f5f5f5;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .install-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 50%, #fbbf24 100%);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
        }
        .app-name {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 10px;
        }
        .app-desc {
            color: #6b7280;
            margin-bottom: 30px;
        }
        .install-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .install-btn:hover {
            transform: translateY(-2px);
        }
        .install-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .info { background: #dbeafe; color: #1e40af; }
        .debug-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            text-align: left;
            margin-top: 20px;
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="install-card">
            <div class="app-icon">ĐN</div>
            <div class="app-name">Họ Phạm Đông Ngạc</div>
            <div class="app-desc">Gia phả điện tử hiện đại</div>
            
            <div id="status" class="status info">Đang kiểm tra khả năng cài đặt...</div>
            
            <button id="install-btn" class="install-btn" onclick="triggerInstall()" disabled>
                📱 Cài đặt ứng dụng
            </button>
            
            <button class="install-btn" onclick="simulateUserInteraction()" style="background: #10b981;">
                🔄 Kích hoạt cài đặt
            </button>
        </div>
        
        <div class="debug-info">
            <strong>🔍 Debug Info:</strong><br>
            <div id="debug-info">Đang tải...</div>
        </div>
    </div>

    <script>
        let deferredPrompt = null;
        let installSupported = false;

        // Update debug info
        function updateDebugInfo() {
            const debugInfo = document.getElementById('debug-info');
            debugInfo.innerHTML = `
                <strong>Install Support:</strong> ${installSupported ? 'YES' : 'NO'}<br>
                <strong>Deferred Prompt:</strong> ${deferredPrompt ? 'Available' : 'Not Available'}<br>
                <strong>HTTPS:</strong> ${location.protocol === 'https:' ? 'YES' : 'NO'}<br>
                <strong>Service Worker:</strong> ${'serviceWorker' in navigator ? 'YES' : 'NO'}<br>
                <strong>Standalone:</strong> ${window.matchMedia('(display-mode: standalone)').matches ? 'YES' : 'NO'}<br>
                <strong>Chrome:</strong> ${/Chrome/.test(navigator.userAgent) ? 'YES' : 'NO'}<br>
                <strong>Android:</strong> ${/Android/.test(navigator.userAgent) ? 'YES' : 'NO'}
            `;
        }

        // Update status
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            
            const installBtn = document.getElementById('install-btn');
            if (deferredPrompt) {
                installBtn.disabled = false;
                installBtn.classList.add('pulse');
            } else {
                installBtn.disabled = true;
                installBtn.classList.remove('pulse');
            }
        }

        // Trigger install
        function triggerInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        updateStatus('✅ Bạn đã đồng ý cài đặt ứng dụng!', 'success');
                        console.log('✅ User accepted the install prompt');
                    } else {
                        updateStatus('❌ Bạn đã từ chối cài đặt ứng dụng', 'warning');
                        console.log('❌ User dismissed the install prompt');
                    }
                    deferredPrompt = null;
                    updateDebugInfo();
                });
            } else {
                updateStatus('❌ Chưa sẵn sàng cài đặt. Hãy thử "Kích hoạt cài đặt"', 'error');
            }
        }

        // Simulate user interaction to trigger install prompt
        function simulateUserInteraction() {
            updateStatus('🔄 Đang kích hoạt cài đặt...', 'info');
            
            // Force user interaction
            const event = new Event('click');
            document.body.dispatchEvent(event);
            
            // Scroll a bit to simulate interaction
            window.scrollBy(0, 1);
            setTimeout(() => window.scrollBy(0, -1), 100);
            
            // Try to trigger install prompt manually
            setTimeout(() => {
                if (deferredPrompt) {
                    updateStatus('🎉 Sẵn sàng cài đặt! Nhấn "Cài đặt ứng dụng"', 'success');
                } else {
                    updateStatus('⚠️ Vui lòng truy cập trang chính và tương tác (scroll, click) rồi quay lại đây', 'warning');
                    
                    // Alternative: redirect to main page
                    setTimeout(() => {
                        if (confirm('Chuyển đến trang chính để kích hoạt cài đặt?')) {
                            window.location.href = '/';
                        }
                    }, 2000);
                }
                updateDebugInfo();
            }, 1000);
        }

        // Listen for install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('🚀 beforeinstallprompt fired!');
            e.preventDefault();
            deferredPrompt = e;
            installSupported = true;
            updateStatus('🎉 Sẵn sàng cài đặt! Nhấn "Cài đặt ứng dụng"', 'success');
            updateDebugInfo();
        });

        // Listen for app installed
        window.addEventListener('appinstalled', (e) => {
            console.log('✅ App installed successfully!');
            updateStatus('🎉 Ứng dụng đã được cài đặt thành công!', 'success');
            deferredPrompt = null;
            updateDebugInfo();
        });

        // Check initial state
        function checkInitialState() {
            installSupported = 'beforeinstallprompt' in window;
            updateDebugInfo();
            
            if (installSupported) {
                updateStatus('🔍 Hỗ trợ cài đặt. Hãy thử "Kích hoạt cài đặt"', 'info');
            } else {
                updateStatus('❌ Trình duyệt không hỗ trợ cài đặt PWA', 'error');
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            checkInitialState();
            
            // Auto-check after 2 seconds
            setTimeout(() => {
                if (!deferredPrompt) {
                    updateStatus('⚠️ Chưa có install prompt. Hãy thử "Kích hoạt cài đặt" hoặc truy cập trang chính', 'warning');
                }
                updateDebugInfo();
            }, 2000);
        });

        // Try to trigger on any user interaction
        document.addEventListener('click', () => {
            setTimeout(() => {
                if (deferredPrompt) {
                    updateStatus('🎉 Sẵn sàng cài đặt! Nhấn "Cài đặt ứng dụng"', 'success');
                    updateDebugInfo();
                }
            }, 100);
        });

        // Also try on scroll
        let scrollTimeout;
        window.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                if (deferredPrompt) {
                    updateStatus('🎉 Sẵn sàng cài đặt! Nhấn "Cài đặt ứng dụng"', 'success');
                    updateDebugInfo();
                }
            }, 500);
        });
    </script>
</body>
</html>
