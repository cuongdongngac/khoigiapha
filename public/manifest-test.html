<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifest Test</title>
    <link rel="manifest" href="/manifest-debug.json">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #f5f5f5;
        }
        .test { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Manifest Test</h1>
    
    <div class="test">
        <h2>📋 Manual Manifest Link Test</h2>
        <div id="manual-result">Testing...</div>
    </div>
    
    <div class="test">
        <h2>🔗 Document Manifest Test</h2>
        <div id="document-result">Testing...</div>
    </div>
    
    <div class="test">
        <h2>📱 PWA Install Test</h2>
        <div id="install-result">Testing...</div>
    </div>

    <script>
        // Test manual manifest fetch
        fetch('/manifest-debug.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(manifest => {
                document.getElementById('manual-result').innerHTML = 
                    `<div class="success">
                        <strong>✅ Manual fetch SUCCESS</strong><br>
                        <strong>Name:</strong> ${manifest.name}<br>
                        <strong>Short Name:</strong> ${manifest.short_name}<br>
                        <strong>Icons:</strong> ${manifest.icons ? manifest.icons.length : 0}<br>
                        <pre>${JSON.stringify(manifest, null, 2)}</pre>
                    </div>`;
            })
            .catch(error => {
                document.getElementById('manual-result').innerHTML = 
                    `<div class="error">
                        <strong>❌ Manual fetch FAILED</strong><br>
                        <strong>Error:</strong> ${error.message}<br>
                        <strong>URL:</strong> /manifest-debug.json
                    </div>`;
            });

        // Test document manifest
        setTimeout(() => {
            const manifestLink = document.querySelector('link[rel="manifest"]');
            if (manifestLink) {
                document.getElementById('document-result').innerHTML = 
                    `<div class="success">
                        <strong>✅ Manifest link found</strong><br>
                        <strong>URL:</strong> ${manifestLink.href}<br>
                        <strong>Rel:</strong> ${manifestLink.rel}
                    </div>`;
            } else {
                document.getElementById('document-result').innerHTML = 
                    `<div class="error">
                        <strong>❌ No manifest link found</strong><br>
                        <strong>Expected:</strong> &lt;link rel="manifest" href="/manifest-debug.json"&gt;
                    </div>`;
            }
        }, 1000);

        // Test PWA install prompt
        setTimeout(() => {
            const installSupported = 'beforeinstallprompt' in window;
            const standalone = window.matchMedia('(display-mode: standalone)').matches;
            
            document.getElementById('install-result').innerHTML = 
                `<div class="${installSupported ? 'success' : 'error'}">
                    <strong>${installSupported ? '✅' : '❌'} Install Support:</strong> ${installSupported}<br>
                    <strong>Standalone:</strong> ${standalone}<br>
                    <strong>PWA Ready:</strong> ${installSupported && !standalone ? 'Yes' : 'No'}
                </div>`;
        }, 2000);

        // Listen for install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('🚀 beforeinstallprompt fired!');
            e.preventDefault();
            window.deferredPrompt = e;
        });
    </script>
</body>
</html>
